# Qdrant-only local service
# Usage:
#     docker compose -f docker-compose.qdrant.yml up -d
#     VECTOR_BACKEND=qdrant QDRANT_URL=http://localhost:6333 uv run pytest tests/unit/test_qdrant_store.py -q

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-financial-analyst-agent-system
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "</dev/tcp/127.0.0.1/6333"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  qdrant-data:
    name: qdrant-financial-analyst-agent-system